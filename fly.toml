# Fly.io config — deploy with:
#   fly launch --no-deploy   (accept this config)
#   fly volumes create concert_data --size 1
#   fly secrets set JWT_SECRET=$(node -e "console.log(require('crypto').randomBytes(32).toString('hex'))")
#   fly deploy
app = "concert-chronicle"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  DATA_DIR = "/data"
  PORT = "3001"

[[mounts]]
  source = "concert_data"
  destination = "/data"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle — this is the cheap part
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
